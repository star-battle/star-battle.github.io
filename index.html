<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Battle Reloaded</title>
  <style>
    /* ── Reset & base ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --bg-surface:  #161b22;
      --bg-code:     #1f2937;
      --border:      #30363d;
      --text:        #c9d1d9;
      --text-muted:  #8b949e;
      --text-head:   #f0f6fc;
      --accent:      #58a6ff;
      --accent-dim:  #1f6feb;
      --tag-balance: #238636;
      --tag-ui:      #1f6feb;
      --tag-bugs:    #b91c1c;
      --tag-content: #9333ea;
      --status-dev:  #d97706;
      --status-test: #0ea5e9;
      --status-live: #16a34a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      padding: 2rem 1rem;
    }

    /* ── Layout ────────────────────────────────────── */
    .page {
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── Patch header ──────────────────────────────── */
    .patch-header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.25rem;
      margin-bottom: 2rem;
    }

    .patch-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-head);
      margin-bottom: 0.75rem;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 0.75rem;
    }

    .meta-date {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .status-badge {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-dev  { background: rgba(217, 119, 6, 0.2);  color: var(--status-dev);  border: 1px solid var(--status-dev); }
    .status-test { background: rgba(14, 165, 233, 0.15); color: var(--status-test); border: 1px solid var(--status-test); }
    .status-live { background: rgba(22, 163, 74, 0.15);  color: var(--status-live); border: 1px solid var(--status-live); }

    .tag {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .tag-game-balance { background: rgba(35, 134, 54, 0.2);  color: #3fb950; border: 1px solid var(--tag-balance); }
    .tag-ui           { background: rgba(31, 111, 235, 0.2); color: #58a6ff; border: 1px solid var(--accent-dim); }
    .tag-bugfixes     { background: rgba(185, 28, 28, 0.2);  color: #f87171; border: 1px solid var(--tag-bugs); }
    .tag-new-content  { background: rgba(147, 51, 234, 0.2); color: #c084fc; border: 1px solid var(--tag-content); }

    /* ── Markdown content ──────────────────────────── */
    .markdown-body {
      color: var(--text);
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5 {
      color: var(--text-head);
      font-weight: 600;
      margin-top: 1.75rem;
      margin-bottom: 0.6rem;
      line-height: 1.3;
    }

    .markdown-body h1 { font-size: 1.5rem;  border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
    .markdown-body h2 { font-size: 1.25rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    .markdown-body h3 { font-size: 1.05rem; }
    .markdown-body h4 { font-size: 0.95rem; color: var(--text-muted); }

    .markdown-body p { margin: 0.6rem 0; }

    .markdown-body ul,
    .markdown-body ol {
      padding-left: 1.5rem;
      margin: 0.5rem 0;
    }

    .markdown-body li { margin: 0.2rem 0; }

    .markdown-body li > ul,
    .markdown-body li > ol {
      margin: 0.1rem 0;
    }

    .markdown-body a {
      color: var(--accent);
      text-decoration: none;
    }
    .markdown-body a:hover { text-decoration: underline; }

    .markdown-body blockquote {
      border-left: 3px solid var(--border);
      padding: 0.3rem 0 0.3rem 1rem;
      margin: 0.75rem 0;
      color: var(--text-muted);
    }

    .markdown-body code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.85em;
      background: var(--bg-code);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      color: #e3b341;
    }

    .markdown-body pre {
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      margin: 0.75rem 0;
    }

    .markdown-body pre code {
      background: none;
      padding: 0;
      color: var(--text);
      font-size: 0.875rem;
    }

    .markdown-body img {
      max-width: 100%;
      border-radius: 6px;
      border: 1px solid var(--border);
      margin: 0.5rem 0;
      display: block;
    }

    .markdown-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    .markdown-body table {
      border-collapse: collapse;
      width: 100%;
      margin: 0.75rem 0;
    }

    .markdown-body th,
    .markdown-body td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }

    .markdown-body th {
      background: var(--bg-surface);
      color: var(--text-head);
      font-weight: 600;
    }

    .markdown-body tr:nth-child(even) { background: var(--bg-surface); }

    /* Keyboard keys */
    .markdown-body kbd {
      display: inline-block;
      padding: 0.1em 0.4em;
      font-size: 0.8em;
      font-family: inherit;
      color: var(--text);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      border-radius: 4px;
    }

    /* Checkboxes */
    .markdown-body input[type="checkbox"] { margin-right: 0.4em; }

    /* ── Index page specifics ───────────────────────── */
    .index-list {
      list-style: none;
      padding: 0;
    }

    .index-list li {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.875rem 1rem;
      margin-bottom: 0.6rem;
      background: var(--bg-surface);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      transition: border-color 0.15s;
    }

    .index-list li:hover { border-color: var(--accent-dim); }

    .index-list a {
      color: var(--text-head);
      font-weight: 600;
      text-decoration: none;
      font-size: 1rem;
      flex: 1;
      min-width: 180px;
    }

    .index-list a:hover { color: var(--accent); }

    .index-date { color: var(--text-muted); font-size: 0.875rem; }

    /* ── Site footer ───────────────────────────────── */
    .site-footer {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      gap: 1.25rem;
      padding: 2rem 0 1rem;
      margin-top: 2rem;
      border-top: 1px solid var(--border);
    }

    .site-footer a {
      color: var(--text-muted);
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .site-footer a:hover {
      color: var(--accent);
    }

    .site-footer img {
      opacity: 0.6;
      transition: opacity 0.15s;
    }

    .site-footer a:hover img {
      opacity: 1;
    }

    /* ── Responsive ────────────────────────────────── */
    @media (max-width: 600px) {
      body { padding: 1rem 0.75rem; }
      .patch-header h1 { font-size: 1.4rem; }
    }
  </style>

    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem 0 1rem;
      gap: 1.5rem;

    .landing-logo img {
      width: 75vh;

      display: block;

      border-radius: 5px;

    .landing-title {
      font-family: 'Electrolize', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-head);
      line-height: 1.2;
      margin: 0;
      border: none;
      padding: 0;
    }

    .landing-hero {
      max-width: 640px;
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.7;
      margin: 0;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 800px;
      margin-top: 0.5rem;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      padding: 1.35rem 1.5rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none !important;
      transition: border-color 0.15s;
    }

    .card:hover {
      border-color: var(--accent-dim);
      text-decoration: none !important;
    }

    .card-title {
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--text-head);
    }

    .card-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    @media (max-width: 480px) {
      .landing-title { font-size: 1.6rem; }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
